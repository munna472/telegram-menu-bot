services:
  - type: web
    name: telegram-menu-bot
    runtime: node
    repo: https://github.com/YOUR_USERNAME/telegram-menu-bot
    plan: free
    startCommand: npm start
    envVars:
      - key: BOT_TOKEN
        sync: false
      - key: GROUP_ID
        sync: false
      - key: PORT
        value: 10000
        
